kind = "web"
previewPath = "/"
title = "House Finder"
version = "1.0.0"
id = "artifacts/house-finder"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25110

[services.development]
run = "pnpm --filter @workspace/house-finder run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/house-finder", "run", "build" ]
publicDir = "artifacts/house-finder/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25110"
BASE_PATH = "/"
